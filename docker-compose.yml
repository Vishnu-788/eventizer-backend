services:
    backend:
        build: .
        container_name: eventizer_backend
        command: uv run python manage.py runserver 0.0.0.0:8000
        ports:
            - "8000:8000"
        env_file:
            - .env-docker
        depends_on:
            - db
        networks:
            - eventizer_network
    
    db:
        image: mysql:8.4.6
        container_name: eventizer_mysql
        env_file:
            - .env-docker
        ports:
            - "3306:3306"
        volumes:
            - mysql:/var/lib/mysql
        networks:
            - eventizer_network

    vectordb:
        image: chromadb/chroma:1.4.1
        container_name: eventizer_vectordb
        ports:
            - "8001:8000"
        volumes:
            - chromadb:/data
        networks:
            - eventizer_network
    
    redis:
        image: redis:8.6-trixie
        container_name: eventizer_redis
        ports:
            - "6379:6379"
        networks:
            - eventizer_network
    
    celery_worker:
        build: .
        container_name: eventizer_celery_worker
        env_file:
            - .env-docker
        command: uv run celery -A eventizer worker -l info
        networks:
            - eventizer_network

networks:
    eventizer_network:
        driver: bridge
    
volumes:
    mysql:
        external: true
    chromadb:
        external: true

